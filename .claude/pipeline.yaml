# pipeline.yaml -- declarative pipeline manifest for THIS repo.
# ADDITIVE to .claude/pipeline.json (project calibration) -- disjoint field sets, see
# plugins/pipeline-core/lib/manifest.mjs file header for the dedup confirmation.
# Schema: pipeline.manifest.v0 (plugins/pipeline-core/scripts/pipeline-manifest.schema.json).
# Validate with: node harness/scripts/validate-manifest.mjs

schema: pipeline.manifest.v0

# This repo is docs+guardrails only (no live UI) -- ui-design stays declared but its
# condition keeps it inactive until flags.has_ui below flips true for a project that has one.
phases:
  - name: design
    enabled: true
  - name: implementation
    enabled: true
  - name: security-scan
    enabled: true
  - name: ui-design
    enabled: true
    condition: has_ui

# Exactly 2 blocking human gates (dev-plan, push) plus 1 blocking automated gate
# (security) -- the PO's tuning directive. push carries a standing
# approval (ADR-0017 precedent: the PO is PO/CEO, not a developer -- pushing main at
# work-package boundaries is pre-approved, never a per-push live human touch).
gates:
  dev-plan:
    mode: blocking
    type: human
  push:
    mode: blocking
    type: human
    approval: standing-approved # ADR-0017
  security:
    mode: blocking
    type: automated

security:
  scanners:
    gitleaks:
      enabled: true
    osv-scanner:
      enabled: true
    semgrep:
      enabled: true
      rules_dir: governance/examples/policies/semgrep

# Machine-readable projection of policies/model-policy.md (MP-01/02/05/07/27/28) -- that file
# stays canonical; this is only the pipeline's own reflection of it, per role. The models
# below are the shipped defaults; override them per role in pipeline.user.yaml (worktypes.*/models.*).
modelRouting:
  # elephant: pipeline-manifest.schema.json's modelRouting shape is a flat {model, effort, note}
  # per role (schema-lite has no $ref/oneOf to express nested per-worktype/phase routing without
  # invasive manifest-schema surgery, flagged as out of scope -- see the shared setup.mjs
  # renderPipelineYaml() comment). "profile-bound" stays the representative-value placeholder;
  # the authoritative per-worktype/phase routing lives in pipeline.user.yaml -> worktypes
  # (design-first/advisor/speed session profiles, MP-01/26/28).
  elephant:
    model: profile-bound
    effort: profile-bound
    note: "session-profile-bound -- see pipeline.user.yaml -> worktypes for the authoritative per-worktype/phase routing"
  # goldfish: representative value (the MP-27 3-tier dispatch matrix -- mechanic/implement/deep --
  # is canonical in policies/model-policy.md; this single entry is not yet split per tier here).
  goldfish:
    model: sonnet-5
    effort: xhigh
    note: "representative value -- MP-27 3-tier dispatch matrix (mechanic/implement/deep) is canonical in policies/model-policy.md"
  critic:
    model: sonnet-5
    effort: max
    note: "MP-07 -- review tier escalates to a higher-capability model on architecture/guardrails/security findings"

profiles:
  active: full-sdlc
  quick:
    phases:
      - implementation
  full-sdlc:
    phases:
      - design
      - implementation
      - security-scan
      - ui-design

governance:
  guidelines_path: governance/examples/guidelines
  policies_path: governance/examples/policies

flags:
  has_ui: false
