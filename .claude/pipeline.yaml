schema: pipeline.manifest.v0

language:
  human_facing: en

phases:
  - name: design
    enabled: true
  - name: implementation
    enabled: true
  - name: security-scan
    enabled: true
  - name: ui-design
    enabled: true
    condition: has_ui

gates:
  dev-plan:
    mode: blocking
    type: human
  push:
    mode: blocking
    type: human
    approval: required
  security:
    mode: blocking
    type: automated

security:
  scanners:
    gitleaks:
      enabled: true
    osv-scanner:
      enabled: true
    semgrep:
      enabled: true
      rules_dir: governance/examples/policies/semgrep

