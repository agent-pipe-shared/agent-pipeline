agent_runtime: "claude-code"
autonomy:
  branch_model: "feature-branch"
  push_policy: "gated"
  wip_limit: 1
critic_export:
  mode: "allowlisted"
  rules:
    -
      assuranceClass: "claude-native-bare-read-only"
      dataClass: "repository-candidate"
      packetBoundary: "candidate-diff-and-allowlisted-references"
      packetSchema: "pipeline.critic-candidate-packet.v1"
      provider: "anthropic"
    -
      assuranceClass: "functional-equivalent-read-only; OS isolation not asserted"
      dataClass: "repository-candidate"
      packetBoundary: "candidate-diff-and-allowlisted-references"
      packetSchema: "pipeline.critic-candidate-packet.v1"
      provider: "anthropic"
    -
      assuranceClass: "functional-equivalent-read-only; OS isolation not asserted"
      dataClass: "repository-candidate"
      packetBoundary: "candidate-diff-and-allowlisted-references"
      packetSchema: "pipeline.critic-candidate-packet.v1"
      provider: "openai"
  schema: "pipeline.critic-export-policy.v1"
gates:
  claude_md_max_lines: 200
  dev_plan: "blocking"
  push: "blocking"
  security: "blocking"
language:
  agent_facing: "en"
  human_facing: "en"
roles:
  po:
    display_label: "PO"
routing:
  duties:
    advisory:
      claude:
        adapter: "native-fable"
        effort: "not-applicable"
        evidence: "advisory-receipt"
        fallbacks:
          -
            adapter: "native-opus"
            effort: "not-applicable"
            runner: "claude"
            selector:
              kind: "alias"
              value: "opus"
            when: "native-fable-repeated-failure"
          -
            adapter: "consult"
            effort: "max"
            isolation: "fresh-read-only"
            runner: "claude"
            selector:
              kind: "alias"
              value: "fable"
            when: "native-adapters-unavailable"
        selector:
          kind: "alias"
          value: "fable"
        state: "default"
      codex:
        adapter: "consult"
        effort: "max"
        evidence: "advisory-receipt"
        isolation: "fresh-read-only"
        runner: "codex"
        selector:
          kind: "model-id"
          value: "gpt-5.6-sol"
        state: "default"
      eligibility:
        epic: "required"
        feature: "required"
        mini: "disabled"
      receipt: "pipeline.advisory-receipt.v1"
    critic_high_risk:
      claude:
        effort: "max"
        evidence: "dispatch-receipt"
        selector:
          kind: "alias"
          value: "opus"
        state: "default"
        unavailable: "defer"
      codex:
        effort: "max"
        evidence: "dispatch-receipt"
        selector:
          kind: "model-id"
          value: "gpt-5.6-sol"
        state: "default"
        unavailable: "defer"
    critic_normal:
      claude:
        effort: "high"
        evidence: "dispatch-receipt"
        selector:
          kind: "alias"
          value: "sonnet"
        state: "default"
        unavailable: "defer"
      codex:
        effort: "high"
        evidence: "dispatch-receipt"
